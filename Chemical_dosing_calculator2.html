<script>

const baseNaoh32Points = [
  { ph: 8.8, ratio: 0.0034 },
  { ph: 9.0, ratio: 0.0056 },
  { ph: 9.2, ratio: 0.0060 },
  { ph: 10.0, ratio: 0.0184 }
];

function interpolateNaoh32Ratio(targetPh) {

  const points = baseNaoh32Points;

  // BELOW RANGE (extrapolate using first two points)
  if (targetPh < points[0].ph) {

    const p1 = points[0];
    const p2 = points[1];

    const fraction = (targetPh - p1.ph) / (p2.ph - p1.ph);

    return p1.ratio + fraction * (p2.ratio - p1.ratio);
  }

  // ABOVE RANGE (extrapolate using last two points)
  if (targetPh > points[points.length - 1].ph) {

    const p1 = points[points.length - 2];
    const p2 = points[points.length - 1];

    const fraction = (targetPh - p1.ph) / (p2.ph - p1.ph);

    return p1.ratio + fraction * (p2.ratio - p1.ratio);
  }

  // INTERPOLATION BETWEEN POINTS
  for (let i = 0; i < points.length - 1; i++) {

    const p1 = points[i];
    const p2 = points[i + 1];

    if (targetPh === p1.ph) return p1.ratio;

    if (targetPh > p1.ph && targetPh <= p2.ph) {

      const fraction = (targetPh - p1.ph) / (p2.ph - p1.ph);

      return p1.ratio + fraction * (p2.ratio - p1.ratio);
    }
  }

}

const chemicalType = document.getElementById("chemicalType");
const concentrationSection = document.getElementById("concentrationSection");
const concentrationSelect = document.getElementById("chemicalConcentration");
const naohTargetSection = document.getElementById("naohTargetSection");
const h2o2TargetSection = document.getElementById("h2o2TargetSection");
const phHelpText = document.getElementById("phHelpText");

chemicalType.addEventListener("change", function () {

  const chemical = chemicalType.value;

  concentrationSection.style.display = "none";
  naohTargetSection.style.display = "none";
  h2o2TargetSection.style.display = "none";
  concentrationSelect.innerHTML = "";

  if (chemical === "NaOH") {

    concentrationSection.style.display = "block";
    naohTargetSection.style.display = "block";

    concentrationSelect.innerHTML = `
      <option value="32">32%</option>
      <option value="27">27%</option>
    `;
  }

  if (chemical === "H2O2") {

    concentrationSection.style.display = "block";
    h2o2TargetSection.style.display = "block";

    concentrationSelect.innerHTML = `
      <option value="standard">Standard</option>
    `;
  }

});

document.getElementById("calculateButton").addEventListener("click", function () {

  const chemical = chemicalType.value;
  const concentration = concentrationSelect.value;
  const sludgeFlow = parseFloat(document.getElementById("sludgeFlow").value);

  if (!chemical) {
    alert("Please select a chemical.");
    return;
  }

  if (isNaN(sludgeFlow) || sludgeFlow < 0) {
    alert("Please enter a valid sludge flow rate.");
    return;
  }

  let ratio = NaN;
  let targetText = "";

  if (chemical === "NaOH") {

    const targetPh = parseFloat(document.getElementById("targetPh").value);

    if (isNaN(targetPh) || targetPh < 6 || targetPh > 14) {
      alert("Please enter a valid pH between 6 and 14.");
      return;
    }

    targetText = `pH ${targetPh.toFixed(1)}`;

    // MESSAGE LOGIC
    if (targetPh < 8.8) {

      phHelpText.textContent =
        "Warning: pH below 8.8 is outside the calibrated NaOH range. Result is extrapolated.";

    }

    else if (targetPh > 10) {

      phHelpText.textContent =
        "Warning: pH above 10 is outside the calibrated NaOH range. Result is extrapolated.";

    }

    else {

      phHelpText.textContent = "";

    }

    const baseRatio = interpolateNaoh32Ratio(targetPh);

    if (concentration === "32") {

      ratio = baseRatio;

    }

    else if (concentration === "27") {

      ratio = baseRatio * (32 / 27);

    }

  }

  if (chemical === "H2O2") {

    const targetDose = parseFloat(document.getElementById("targetDose").value);

    if (isNaN(targetDose) || targetDose < 0) {
      alert("Please enter a valid H2O2 target dose.");
      return;
    }

    targetText = `${targetDose.toFixed(1)} mL/L`;

    ratio = targetDose / 1000;

  }

  const pumpLpm = ratio * sludgeFlow;
  const pumpMlMin = pumpLpm * 1000;
  const ratioMlL = ratio * 1000;

  document.getElementById("chemicalResult").textContent = chemical;

  document.getElementById("concentrationResult").textContent =
    concentration === "standard" ? "Standard" : concentration + "%";

  document.getElementById("targetResult").textContent = targetText;

  document.getElementById("ratioResult").textContent =
    ratioMlL.toFixed(2) + " mL/L";

  document.getElementById("pumpLpmResult").textContent =
    pumpLpm.toFixed(4);

  document.getElementById("pumpMlMinResult").textContent =
    pumpMlMin.toFixed(1);

  document.getElementById("results").style.display = "block";

});

</script>
