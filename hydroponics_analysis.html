<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hydroponics + Horiba Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { margin-top: 20px; }
    .chart-container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .result-box {
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body class="container">

  <h2 class="text-center">Hydroponics + Horiba Analysis</h2>

<div class="text-center mb-3">
  <a href="GC_calculator.html" class="btn btn-outline-primary me-2">GC Calculator</a>
  <a href="Chemical_dosing_calculator2.html" class="btn btn-outline-success me-2">Chemical Dosing Calculator</a>
  <a href="hydroponics_analysis.html" class="btn btn-outline-info">Hydroponics + Horiba Analysis</a>
</div>

  <section class="mt-4">
    <div class="row justify-content-center">
      <div class="col-md-7">

        <div class="mb-3">
          <label for="fileInput" class="form-label">Upload Excel file</label>
          <input type="file" id="fileInput" accept=".xlsx" class="form-control">
        </div>

        <div class="mb-3">
          <label for="experimentSelect" class="form-label">Select experiment</label>
          <select id="experimentSelect" class="form-select">
            <option value="">Upload file first</option>
          </select>
        </div>

        <div class="d-grid">
          <button id="plotButton" class="btn btn-primary">Plot pH Comparison</button>
        </div>

        <div id="statusBox" class="result-box mt-3" style="display:none;"></div>

      </div>
    </div>
  </section>

  <section class="mt-5 chart-container">
    <canvas id="phChart" height="120"></canvas>
  </section>

  <script>
    let hydroData = [];
    let horibaData = [];
    let phChartInstance = null;

    function cleanColumns(row) {
      const cleaned = {};
      Object.keys(row).forEach(key => {
        const cleanKey = String(key).trim().toLowerCase().replace(/ /g, "_");
        cleaned[cleanKey] = row[key];
      });
      return cleaned;
    }

    function excelDateToJSDate(serial) {
      return new Date((serial - 25569) * 86400 * 1000);
    }

    function parseHydroDate(value) {
      if (typeof value === "number") return excelDateToJSDate(value);
      return new Date(value);
    }

    function parseHoribaTimestamp(value) {
      if (typeof value === "number") return excelDateToJSDate(value);
      return new Date(value);
    }

    function normaliseStream(value) {
      const v = String(value || "").toLowerCase().trim();

      if (
        v === "in" ||
        v === "inlet" ||
        v.includes(" inlet") ||
        v.endsWith(" in") ||
        v.includes("_in") ||
        v.includes("untreated")
      ) return "inlet";

      if (
        v === "out" ||
        v === "outlet" ||
        v.includes(" outlet") ||
        v.endsWith(" out") ||
        v.includes("_out") ||
        v.includes("treated")
      ) return "outlet";

      return "";
    }

    function showStatus(message, isError = false) {
      const box = document.getElementById("statusBox");
      box.style.display = "block";
      box.className = isError ? "result-box mt-3 border border-danger" : "result-box mt-3";
      box.innerHTML = message;
    }

    document.getElementById("fileInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: "array" });

        if (!workbook.SheetNames.includes("Hydroponics_raw") || !workbook.SheetNames.includes("Horiba_raw")) {
          showStatus("The workbook must contain both <strong>Hydroponics_raw</strong> and <strong>Horiba_raw</strong> sheets.", true);
          return;
        }

        const hydroSheet = workbook.Sheets["Hydroponics_raw"];
        const horibaSheet = workbook.Sheets["Horiba_raw"];

        hydroData = XLSX.utils.sheet_to_json(hydroSheet, { defval: "" }).map(cleanColumns);
        horibaData = XLSX.utils.sheet_to_json(horibaSheet, { defval: "" }).map(cleanColumns);

        const hydroExperiments = hydroData.map(row => String(row.experiment || "").trim()).filter(x => x !== "");
        const horibaExperiments = horibaData.map(row => String(row.experiment_id || "").trim()).filter(x => x !== "");

        const allExperiments = [...new Set([...hydroExperiments, ...horibaExperiments])].sort();

        const experimentSelect = document.getElementById("experimentSelect");
        experimentSelect.innerHTML = "";

        allExperiments.forEach(exp => {
          const option = document.createElement("option");
          option.value = exp;
          option.textContent = exp;
          experimentSelect.appendChild(option);
        });

        if (allExperiments.length === 0) {
          experimentSelect.innerHTML = '<option value="">No experiments found</option>';
          showStatus("No experiment IDs were found in the uploaded workbook.", true);
          return;
        }

        showStatus(
          `<strong>File loaded successfully.</strong><br>
          Hydroponics rows: ${hydroData.length}<br>
          Horiba rows: ${horibaData.length}<br>
          Experiments found: ${allExperiments.length}`
        );
      };

      reader.readAsArrayBuffer(file);
    });

    document.getElementById("plotButton").addEventListener("click", function() {
      const selectedExperiment = String(document.getElementById("experimentSelect").value || "").trim();

      if (!selectedExperiment) {
        showStatus("Please upload a workbook and select an experiment.", true);
        return;
      }

      let hydroExp = hydroData
        .filter(row => String(row.experiment || "").trim() === selectedExperiment)
        .map(row => ({ ...row }));

      let horibaExp = horibaData
        .filter(row => String(row.experiment_id || "").trim() === selectedExperiment)
        .map(row => ({ ...row }));

      if (hydroExp.length === 0 && horibaExp.length === 0) {
        showStatus(`No Hydroponics or Horiba data found for experiment <strong>${selectedExperiment}</strong>.`, true);
        return;
      }

      hydroExp.forEach(row => {
        row.datetime = parseHydroDate(row.timestamp);
        row.stream_clean = normaliseStream(row.stream);
        row.ph_num = parseFloat(row.ph);
      });

      horibaExp.forEach(row => {
        row.datetime = parseHoribaTimestamp(row.timestamp);
        row.stream_clean = normaliseStream(row.stream);
        row.ph_num = parseFloat(row.ph);
      });

      hydroExp = hydroExp
        .filter(row => !isNaN(row.datetime) && !isNaN(row.ph_num))
        .sort((a, b) => a.datetime - b.datetime);

      horibaExp = horibaExp
        .filter(row => !isNaN(row.datetime) && !isNaN(row.ph_num))
        .sort((a, b) => a.datetime - b.datetime);

      if (hydroExp.length === 0) {
        showStatus(`Hydroponics data for <strong>${selectedExperiment}</strong> could not be plotted. Check that <strong>timestamp</strong>, <strong>stream</strong> and <strong>ph</strong> are present.`, true);
        return;
      }

      const startTime = hydroExp[0].datetime;

      hydroExp.forEach(row => {
        row.elapsed_min = (row.datetime - startTime) / 60000;
      });

      horibaExp.forEach(row => {
        row.elapsed_min = (row.datetime - startTime) / 60000;
      });

      const hydroInlet = hydroExp
        .filter(row => row.stream_clean === "inlet")
        .map(row => ({ x: row.elapsed_min, y: row.ph_num }));

      const hydroOutlet = hydroExp
        .filter(row => row.stream_clean === "outlet")
        .map(row => ({ x: row.elapsed_min, y: row.ph_num }));

      const horibaInlet = horibaExp
        .filter(row => row.stream_clean === "inlet")
        .map(row => ({ x: row.elapsed_min, y: row.ph_num }));

      const horibaOutlet = horibaExp
        .filter(row => row.stream_clean === "outlet")
        .map(row => ({ x: row.elapsed_min, y: row.ph_num }));

      const ctx = document.getElementById("phChart").getContext("2d");

      if (phChartInstance) {
        phChartInstance.destroy();
      }

      phChartInstance = new Chart(ctx, {
        type: "line",
        data: {
          datasets: [
            {
              label: "Hydroponics inlet",
              data: hydroInlet,
              borderColor: "#203060",
              backgroundColor: "#203060",
              tension: 0.2,
              pointRadius: 0,
              borderWidth: 2.5
            },
            {
              label: "Hydroponics outlet",
              data: hydroOutlet,
              borderColor: "#00BCDB",
              backgroundColor: "#00BCDB",
              tension: 0.2,
              pointRadius: 0,
              borderWidth: 2.5
            },
            {
              label: "Horiba inlet",
              data: horibaInlet,
              type: "scatter",
              backgroundColor: "#EEB924",
              borderColor: "#203060",
              pointRadius: 7,
              pointHoverRadius: 8
            },
            {
              label: "Horiba outlet",
              data: horibaOutlet,
              type: "scatter",
              backgroundColor: "#97CC32",
              borderColor: "#203060",
              pointRadius: 7,
              pointHoverRadius: 8
            }
          ]
        },
        options: {
          responsive: true,
          parsing: false,
          plugins: {
            title: {
              display: true,
              text: `Hydroponics vs Horiba pH over Time (${selectedExperiment})`
            }
          },
          scales: {
            x: {
              type: "linear",
              title: {
                display: true,
                text: "Elapsed time (minutes)"
              }
            },
            y: {
              title: {
                display: true,
                text: "pH"
              },
              min: 6,
              max: 14
            }
          }
        }
      });

      const horibaStreamValues = [...new Set(
        horibaExp.map(row => row.stream)
      )].join(", ");

      const horibaCleanValues = [...new Set(
        horibaExp.map(row => row.stream_clean)
      )].join(", ");

      showStatus(
        `<strong>Plot created for ${selectedExperiment}.</strong><br>
        Hydroponics points: ${hydroExp.length}<br>
        Horiba points: ${horibaExp.length}<br>
        Horiba stream values found: ${horibaStreamValues || "none"}<br>
        Horiba cleaned values: ${horibaCleanValues || "none"}`
      );
    });
  </script>

</body>
</html>
